name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create zip
        run: |
          zip -r npc-knight-generator.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            lang/

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            module.json \
            npc-knight-generator.zip \
            --clobber
